name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - run: npm run lint || true
      - run: npm test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build

  mockup:
    # Static HTML/CSS mockup published to GitHub Pages — no build step, so this is the only gate.
    # Unlike backend's `lint || true`, this one blocks: the ruleset is deliberately minimal
    # (duplicate IDs, invalid CSS/hex, unclosed tags — real bugs, not style) so it starts from a
    # clean baseline and stays meaningful rather than becoming ignorable noise.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint:mockup
