<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vst_title">
  <title id="vst_title">Helix - Cisco data plane streams</title>
  <defs>
    <linearGradient id="vst_bb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003949"/><stop offset="35%" stop-color="#049FD9"/><stop offset="100%" stop-color="#7FDBFF"/>
    </linearGradient>
    <linearGradient id="vst_bb2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="40%" stop-color="#FF1B8D"/><stop offset="100%" stop-color="#FDA4D0"/>
    </linearGradient>
    <linearGradient id="vst_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#e0f4fc"/><stop offset="70%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vst_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6007E" stop-opacity="0.5"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#E6007E" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="vst_g" cx="130" cy="58" r="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#049FD9" stop-opacity="0.12"/><stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="vst_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.45" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vst_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="58" rx="104" ry="56" fill="url(#vst_g)"/>
  <!-- Parallel throughput lanes -->
  <path fill="none" stroke="url(#vst_bb2)" stroke-width="3.5" stroke-linecap="round" opacity="0.9" filter="url(#vst_glow)"
    d="M 74 36 C 110 44 150 28 186 36"/>
  <path fill="none" stroke="url(#vst_bb)" stroke-width="4.5" stroke-linecap="round" filter="url(#vst_glow)"
    d="M 74 52 C 106 62 154 42 186 52"/>
  <path fill="none" stroke="url(#vst_bb2)" stroke-width="4" stroke-linecap="round" opacity="0.85" filter="url(#vst_glow)"
    d="M 74 68 C 112 58 148 78 186 68"/>
  <path fill="none" stroke="url(#vst_bb)" stroke-width="3.5" stroke-linecap="round" opacity="0.8" filter="url(#vst_glow)"
    d="M 74 84 C 100 74 160 94 186 84"/>
  <!-- Packet ticks -->
  <circle cx="98" cy="40" r="2.5" fill="#FF1B8D"/><circle cx="130" cy="54" r="2.8" fill="#ffffff" stroke="#049FD9" stroke-width="0.9"/>
  <circle cx="162" cy="44" r="2.5" fill="#049FD9"/><circle cx="118" cy="72" r="2.2" fill="#FDA4D0"/>
  <circle cx="154" cy="80" r="2.2" fill="#5BCFFF"/>
  <g filter="url(#vst_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vst_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vst_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
