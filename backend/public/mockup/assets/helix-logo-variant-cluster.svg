<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vcl_title">
  <title id="vcl_title">Helix - Tri-cluster</title>
  <defs>
    <linearGradient id="vcl_bb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#7FDBFF"/>
    </linearGradient>
    <linearGradient id="vcl_bb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BE185D"/><stop offset="50%" stop-color="#E6007E"/><stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="vcl_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="42%" stop-color="#e0f4fc"/><stop offset="72%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vcl_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1B8D" stop-opacity="0.35"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="vcl_g" cx="130" cy="58" r="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4DB8" stop-opacity="0.14"/><stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="vcl_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vcl_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="58" rx="102" ry="56" fill="url(#vcl_g)"/>
  <g fill="none" stroke-linecap="round" opacity="0.5">
    <path stroke="#049FD9" stroke-width="1.6" d="M 94 42 L 118 54 M 166 42 L 142 54 M 118 72 L 130 80 L 142 72"/>
  </g>
  <circle cx="88" cy="38" r="4.5" fill="#003949" stroke="#7FDBFF" stroke-width="1.1"/>
  <circle cx="96" cy="52" r="3.5" fill="#049FD9"/>
  <circle cx="172" cy="38" r="4.5" fill="#9D174D" stroke="#FDA4D0" stroke-width="1.1"/>
  <circle cx="164" cy="52" r="3.5" fill="#FF1B8D"/>
  <circle cx="130" cy="88" r="4" fill="#005C8C"/>
  <path fill="none" stroke="url(#vcl_bb2)" stroke-width="5.5" stroke-linecap="round" filter="url(#vcl_glow)"
