  <circle cx="130" cy="58" r="5" fill="#ffffff" stroke="#049FD9" stroke-width="1.3"/>
  <g filter="url(#vcl_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vcl_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vcl_sw)" stroke-width="3.5" stroke-linecap="round"/>
