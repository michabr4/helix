<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vsp_title">
  <title id="vsp_title">Helix - Dual spiral</title>
  <defs>
    <linearGradient id="vsp_bb" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#7FDBFF"/>
    </linearGradient>
    <linearGradient id="vsp_bb2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="50%" stop-color="#FF1B8D"/><stop offset="100%" stop-color="#FDA4D0"/>
    </linearGradient>
    <linearGradient id="vsp_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="42%" stop-color="#e0f4fc"/><stop offset="72%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vsp_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1B8D" stop-opacity="0.35"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="vsp_g" cx="130" cy="58" r="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#049FD9" stop-opacity="0.14"/><stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="vsp_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.55" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vsp_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="58" rx="104" ry="56" fill="url(#vsp_g)"/>
  <path fill="none" stroke="url(#vsp_bb)" stroke-width="5.5" stroke-linecap="round" filter="url(#vsp_glow)"
    d="M 154 26 C 128 26 108 40 108 58 C 108 78 128 88 146 88 C 168 88 182 72 182 52 C 182 26 158 12 130 12"/>
  <path fill="none" stroke="url(#vsp_bb2)" stroke-width="5.5" stroke-linecap="round" filter="url(#vsp_glow)"
    d="M 106 26 C 132 26 152 40 152 58 C 152 78 132 88 114 88 C 92 88 78 72 78 52 C 78 26 102 12 130 12"/>
  <circle cx="130" cy="52" r="5" fill="#ffffff" stroke="#049FD9" stroke-width="1.4"/>
  <g filter="url(#vsp_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vsp_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vsp_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
