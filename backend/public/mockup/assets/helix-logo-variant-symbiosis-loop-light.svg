    </linearGradient>
    <linearGradient id="sybl_bb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="50%" stop-color="#FF1B8D"/><stop offset="100%" stop-color="#FDA4D0"/>
    </linearGradient>
    <linearGradient id="sybl_wm" x1="0%" y1="0%" x2="100%" y2="0%">
