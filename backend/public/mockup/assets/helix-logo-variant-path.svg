<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vpc_title">
  <title id="vpc_title">Helix - Cisco optimal path</title>
  <defs>
    <linearGradient id="vpc_bb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#7FDBFF"/>
    </linearGradient>
    <linearGradient id="vpc_bb2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#BE185D"/><stop offset="50%" stop-color="#FF1B8D"/><stop offset="100%" stop-color="#FDA4D0"/>
    </linearGradient>
    <linearGradient id="vpc_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#e0f4fc"/><stop offset="70%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vpc_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6007E" stop-opacity="0.45"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#E6007E" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="vpc_g" cx="130" cy="56" r="76" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4DB8" stop-opacity="0.2"/><stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="vpc_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.55" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vpc_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="56" rx="100" ry="54" fill="url(#vpc_g)"/>
  <!-- Site pillars -->
  <rect x="82" y="82" width="14" height="28" rx="3" fill="#003949" stroke="#049FD9" stroke-width="1.2" opacity="0.9"/>
  <rect x="164" y="82" width="14" height="28" rx="3" fill="#003949" stroke="#E6007E" stroke-width="1.2" opacity="0.9"/>
  <!-- Preferred path arc -->
  <path fill="none" stroke="url(#vpc_bb)" stroke-width="7" stroke-linecap="round" filter="url(#vpc_glow)"
    d="M 89 82 Q 130 18 171 82"/>
  <!-- Resilient alternate (underlay) -->
  <path fill="none" stroke="url(#vpc_bb2)" stroke-width="3.5" stroke-linecap="round" opacity="0.65"
    d="M 89 96 Q 130 118 171 96"/>
  <circle cx="89" cy="82" r="4" fill="#049FD9"/><circle cx="171" cy="82" r="4" fill="#FF1B8D"/>
  <circle cx="130" cy="42" r="3.2" fill="#ffffff" stroke="#049FD9" stroke-width="1"/>
  <g filter="url(#vpc_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vpc_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vpc_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
