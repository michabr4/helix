<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vfo_title">
  <title id="vfo_title">Helix - Cisco services orbit</title>
  <defs>
    <linearGradient id="vfo_bb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="vfo_bb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="40%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="vfo_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#e0f4fc"/><stop offset="70%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vfo_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6007E" stop-opacity="0.5"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#E6007E" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="vfo_g" cx="130" cy="56" r="74" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4DB8" stop-opacity="0.22"/><stop offset="100%" stop-color="#005C8C" stop-opacity="0"/>
    </radialGradient>
    <filter id="vfo_glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vfo_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="56" rx="100" ry="54" fill="url(#vfo_g)"/>
  <!-- Orbits -->
  <ellipse cx="130" cy="60" rx="58" ry="34" fill="none" stroke="url(#vfo_bb)" stroke-width="3.5" opacity="0.55" transform="rotate(-18 130 60)"/>
  <ellipse cx="130" cy="60" rx="58" ry="34" fill="none" stroke="url(#vfo_bb2)" stroke-width="3.5" opacity="0.55" transform="rotate(18 130 60)"/>
  <!-- Core helix through center -->
  <path fill="none" stroke="url(#vfo_bb)" stroke-width="6" stroke-linecap="round" filter="url(#vfo_glow)"
    d="M 96 32 C 118 52 124 68 130 88 C 136 68 148 44 168 28"/>
  <path fill="none" stroke="url(#vfo_bb2)" stroke-width="6" stroke-linecap="round" filter="url(#vfo_glow)"
    d="M 164 32 C 142 52 136 68 130 88 C 124 68 112 44 92 28"/>
  <circle cx="130" cy="58" r="6" fill="#ffffff" stroke="#049FD9" stroke-width="1.4"/>
  <circle cx="108" cy="38" r="3" fill="#FF1B8D"/><circle cx="152" cy="38" r="3" fill="#049FD9"/>
  <g filter="url(#vfo_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vfo_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vfo_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
