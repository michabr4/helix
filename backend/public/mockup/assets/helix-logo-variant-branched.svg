<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vB_title">
  <title id="vB_title">Helix — branched pairs variant</title>
  <defs>
    <linearGradient id="vB_bb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#5BCFFF"/>
    </linearGradient>
    <linearGradient id="vB_bb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="40%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="vB_rung" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
    <linearGradient id="vB_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#e0f4fc"/><stop offset="70%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vB_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1B8D" stop-opacity="0.35"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="vB_g" cx="125" cy="62" r="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E6007E" stop-opacity="0.25"/><stop offset="100%" stop-color="#049FD9" stop-opacity="0"/>
    </radialGradient>
    <filter id="vB_glow"><feGaussianBlur stdDeviation="0.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="vB_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge>
        <feMergeNode in="sh"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <ellipse cx="128" cy="64" rx="98" ry="56" fill="url(#vB_g)"/>
  <!-- Branched connectors: each level = small H with joint -->
  <g stroke="url(#vB_rung)" stroke-width="2.8" stroke-linecap="round" fill="none" opacity="0.92">
    <path d="M 98 32 L 130 32 L 162 32"/><circle cx="130" cy="32" r="2.8" fill="#FDA4D0" stroke="none"/>
    <path d="M 94 52 L 130 52 L 166 52"/><circle cx="130" cy="52" r="2.8" fill="#049FD9" stroke="none"/>
    <path d="M 90 72 L 130 72 L 170 72"/><circle cx="130" cy="72" r="3" fill="#FF4DB8" stroke="none"/>
    <path d="M 94 92 L 130 92 L 166 92"/><circle cx="130" cy="92" r="2.8" fill="#049FD9" stroke="none"/>
    <path d="M 98 112 L 130 112 L 162 112"/><circle cx="130" cy="112" r="2.8" fill="#FDA4D0" stroke="none"/>
  </g>
  <!-- Outer backbones with inward branches feel -->
  <path fill="none" stroke="url(#vB_bb)" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#vB_glow)"
    d="M 78 22 Q 88 62 82 102 Q 78 118 92 126 M 78 22 Q 72 40 70 70 Q 72 100 85 122"/>
  <path fill="none" stroke="url(#vB_bb2)" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#vB_glow)"
    d="M 182 22 Q 172 62 178 102 Q 182 118 168 126 M 182 22 Q 188 40 190 70 Q 188 100 175 122"/>
  <circle cx="130" cy="72" r="4" fill="#049FD9" stroke="#ffffff" stroke-width="0.8" opacity="0.95"/>
  <g filter="url(#vB_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vB_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vB_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
