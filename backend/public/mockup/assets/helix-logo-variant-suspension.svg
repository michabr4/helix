  <circle cx="78" cy="26" r="3" fill="#FF1B8D"/><circle cx="182" cy="26" r="3" fill="#049FD9"/>
  <g filter="url(#vsu_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vsu_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vsu_sw)" stroke-width="3.5" stroke-linecap="round"/>
