<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vTl_title">
  <title id="vTl_title">Helix - tight twist variant (light UI wordmark)</title>
  <defs>
    <linearGradient id="vTl_bb" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003949"/><stop offset="45%" stop-color="#049FD9"/><stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="vTl_bb2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="35%" stop-color="#BE185D"/><stop offset="65%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="vTl_rung" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#3D0D28" stop-opacity="0.85"/><stop offset="50%" stop-color="#049FD9" stop-opacity="0.45"/><stop offset="100%" stop-color="#BE185D" stop-opacity="0.5"/>
    </linearGradient>
    <!-- Dark wordmark for light sidebar / UI backgrounds -->
    <linearGradient id="vTl_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="38%" stop-color="#0c4a6e"/>
      <stop offset="64%" stop-color="#831843"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="vTl_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6007E" stop-opacity="0.6"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#E6007E" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="vTl_g" cx="130" cy="55" r="68" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4DB8" stop-opacity="0.38"/><stop offset="100%" stop-color="#005C8C" stop-opacity="0"/>
    </radialGradient>
    <filter id="vTl_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.55" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="vTl_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feOffset in="blur" dy="1" result="off"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.65" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="58" rx="100" ry="54" fill="url(#vTl_g)"/>
  <g stroke="url(#vTl_rung)" stroke-width="2.8" stroke-linecap="round" opacity="0.9">
    <line x1="102" y1="26" x2="158" y2="38"/><line x1="98" y1="42" x2="162" y2="54"/><line x1="94" y1="58" x2="166" y2="70"/>
    <line x1="98" y1="74" x2="162" y2="86"/><line x1="102" y1="90" x2="158" y2="102"/><line x1="108" y1="106" x2="152" y2="118"/>
  </g>
  <path
    fill="none"
    stroke="url(#vTl_bb2)"
    stroke-width="8.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#vTl_glow)"
    d="M 156 18 C 100 28 78 50 82 70 C 86 90 116 100 138 98 C 164 96 188 80 186 58 C 184 68 156 64 132 38 C 108 42 88 60 92 80 C 96 100 124 110 148 108 C 176 104 196 88 194 66"/>
  <path
    fill="none"
    stroke="url(#vTl_bb)"
    stroke-width="8.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#vTl_glow)"
    d="M 104 18 C 160 26 186 48 182 68 C 178 88 148 96 126 94 C 102 92 80 74 82 52 C 84 32 112 26 136 30 C 160 34 180 52 176 72 C 172 92 144 100 122 98 C 96 96 76 80 80 58"/>
  <circle cx="130" cy="34" r="3.8" fill="#FF4DB8"/><circle cx="130" cy="66" r="3.8" fill="#049FD9"/><circle cx="130" cy="98" r="3.8" fill="#FDA4D0"/>
  <g filter="url(#vTl_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vTl_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vTl_sw)" stroke-width="3.5" stroke-linecap="round"/>
