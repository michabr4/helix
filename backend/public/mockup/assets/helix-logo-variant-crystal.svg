<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vcrys_title">
  <title id="vcrys_title">Helix — crystal / angular ladder variant</title>
  <defs>
    <linearGradient id="vc_bb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#5BCFFF"/>
    </linearGradient>
    <linearGradient id="vc_bb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="50%" stop-color="#EC4899"/><stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="vc_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#e0f4fc"/><stop offset="70%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vc_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6007E" stop-opacity="0.5"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#E6007E" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="vc_g" cx="130" cy="56" r="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#049FD9" stop-opacity="0.22"/><stop offset="100%" stop-color="#9D174D" stop-opacity="0"/>
    </radialGradient>
    <filter id="vc_glow"><feGaussianBlur stdDeviation="0.45" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="vc_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="56" rx="100" ry="54" fill="url(#vc_g)"/>
  <!-- Diamond / chevron base pairs -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.92">
    <path stroke="url(#vc_bb)" stroke-width="2.5" d="M 102 30 L 114 42 L 102 54 L 90 42 Z M 158 30 L 170 42 L 158 54 L 146 42 Z"/>
    <path stroke="url(#vc_bb2)" stroke-width="2.5" d="M 88 58 L 100 70 L 88 82 L 76 70 Z M 172 58 L 184 70 L 172 82 L 160 70 Z"/>
    <path stroke="#049FD9" stroke-width="2.5" d="M 102 86 L 114 98 L 102 110 L 90 98 Z M 158 86 L 170 98 L 158 110 L 146 98 Z"/>
  </g>
  <!-- Zigzag backbones (paths: avoids polyline + gradient stroke quirks in some engines) -->
  <path fill="none" stroke="url(#vc_bb2)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#vc_glow)"
    d="M 92 22 L 114 42 L 92 70 L 114 98 L 92 118"/>
  <path fill="none" stroke="url(#vc_bb)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#vc_glow)"
    d="M 168 22 L 146 42 L 168 70 L 146 98 L 168 118"/>
  <circle cx="114" cy="42" r="3.2" fill="#FF4DB8"/><circle cx="146" cy="98" r="3.2" fill="#049FD9"/>
  <g filter="url(#vc_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vc_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vc_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
