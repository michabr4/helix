<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vwl_title">
  <title id="vwl_title">Helix - Wavelength stack</title>
  <defs>
    <linearGradient id="vwl_bb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#7FDBFF"/>
    </linearGradient>
    <linearGradient id="vwl_bb2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="50%" stop-color="#FF1B8D"/><stop offset="100%" stop-color="#FDA4D0"/>
    </linearGradient>
    <linearGradient id="vwl_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="42%" stop-color="#e0f4fc"/><stop offset="72%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vwl_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1B8D" stop-opacity="0.35"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="vwl_g" cx="130" cy="58" r="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#049FD9" stop-opacity="0.14"/><stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="vwl_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.45" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vwl_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="58" rx="102" ry="56" fill="url(#vwl_g)"/>
  <path fill="none" stroke="url(#vwl_bb2)" stroke-width="3.5" stroke-linecap="round" filter="url(#vwl_glow)" opacity="0.9"
    d="M 74 38 C 92 30 100 46 112 38 C 124 30 132 46 148 38 C 164 30 172 46 186 38"/>
  <path fill="none" stroke="url(#vwl_bb)" stroke-width="4" stroke-linecap="round" filter="url(#vwl_glow)"
    d="M 74 54 C 90 62 102 46 118 54 C 134 62 146 46 162 54 C 178 62 186 46 186 54"/>
  <path fill="none" stroke="url(#vwl_bb2)" stroke-width="3.5" stroke-linecap="round" filter="url(#vwl_glow)" opacity="0.85"
    d="M 74 70 C 96 62 104 78 120 70 C 136 62 152 78 166 70 C 180 62 186 78 186 70"/>
  <path fill="none" stroke="url(#vwl_bb)" stroke-width="3" stroke-linecap="round" opacity="0.75"
    d="M 74 86 C 88 94 108 78 130 86 C 152 94 168 78 186 86"/>
  <circle cx="130" cy="62" r="4.5" fill="#ffffff" stroke="#049FD9" stroke-width="1.2"/>
  <g filter="url(#vwl_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vwl_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vwl_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
