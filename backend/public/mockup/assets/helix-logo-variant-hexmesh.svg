<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vfh_title">
  <title id="vfh_title">Helix - Cisco hex campus mesh</title>
  <defs>
    <linearGradient id="vfh_bb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#7FDBFF"/>
    </linearGradient>
    <linearGradient id="vfh_bb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="50%" stop-color="#FF1B8D"/><stop offset="100%" stop-color="#FDA4D0"/>
    </linearGradient>
    <linearGradient id="vfh_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="42%" stop-color="#e0f4fc"/><stop offset="72%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vfh_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1B8D" stop-opacity="0.35"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="vfh_g" cx="130" cy="58" r="76" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#049FD9" stop-opacity="0.2"/><stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="vfh_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vfh_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="58" rx="102" ry="56" fill="url(#vfh_g)"/>
  <!-- Hex r=10 flat-top: center (cx,cy) -> 6 points -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.75">
    <path stroke="url(#vfh_bb)" stroke-width="2.2" d="M 94 40 L 104 34 L 114 40 L 114 52 L 104 58 L 94 52 Z"/>
    <path stroke="url(#vfh_bb2)" stroke-width="2.2" d="M 124 34 L 134 28 L 144 34 L 144 46 L 134 52 L 124 46 Z"/>
    <path stroke="#049FD9" stroke-width="2.2" d="M 154 40 L 164 34 L 174 40 L 174 52 L 164 58 L 154 52 Z"/>
    <path stroke="#E6007E" stroke-width="2.2" opacity="0.65" d="M 109 64 L 119 58 L 129 64 L 129 76 L 119 82 L 109 76 Z"/>
    <path stroke="#049FD9" stroke-width="2.2" opacity="0.65" d="M 139 64 L 149 58 L 159 64 L 159 76 L 149 82 L 139 76 Z"/>
  </g>
  <path fill="none" stroke="url(#vfh_bb2)" stroke-width="6" stroke-linecap="round" filter="url(#vfh_glow)"
    d="M 88 26 C 108 44 118 70 130 96 C 142 70 158 44 172 26"/>
  <path fill="none" stroke="url(#vfh_bb)" stroke-width="6" stroke-linecap="round" filter="url(#vfh_glow)"
    d="M 172 96 C 152 78 138 52 130 28 C 122 52 104 78 88 96"/>
  <circle cx="130" cy="62" r="4.5" fill="#ffffff" stroke="#FF1B8D" stroke-width="1.2"/>
  <g filter="url(#vfh_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vfh_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vfh_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
