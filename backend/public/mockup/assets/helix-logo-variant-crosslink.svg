<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vfx_title">
  <title id="vfx_title">Helix - Cisco east-west crosslink</title>
  <defs>
    <linearGradient id="vfx_bb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#5BCFFF"/>
    </linearGradient>
    <linearGradient id="vfx_bb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="50%" stop-color="#E6007E"/><stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="vfx_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#e0f4fc"/><stop offset="70%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vfx_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6007E" stop-opacity="0.45"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#E6007E" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="vfx_g" cx="130" cy="58" r="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#049FD9" stop-opacity="0.18"/><stop offset="100%" stop-color="#003949" stop-opacity="0"/>
    </radialGradient>
    <filter id="vfx_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.55" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vfx_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="58" rx="102" ry="56" fill="url(#vfx_g)"/>
  <!-- Horizontal plane -->
  <path fill="none" stroke="url(#vfx_bb)" stroke-width="8" stroke-linecap="round" filter="url(#vfx_glow)"
    d="M 78 58 L 182 58"/>
  <!-- Vertical plane (rounded through hub) -->
  <path fill="none" stroke="url(#vfx_bb2)" stroke-width="8" stroke-linecap="round" filter="url(#vfx_glow)"
    d="M 130 26 L 130 90"/>
  <!-- Hub -->
  <circle cx="130" cy="58" r="12" fill="#020617" stroke="url(#vfx_bb)" stroke-width="2.5" opacity="0.92"/>
  <circle cx="130" cy="58" r="6" fill="#ffffff" opacity="0.95"/>
  <!-- Corner emphasis -->
  <circle cx="78" cy="58" r="3.5" fill="#049FD9"/><circle cx="182" cy="58" r="3.5" fill="#049FD9"/>
  <circle cx="130" cy="26" r="3.5" fill="#FF1B8D"/><circle cx="130" cy="90" r="3.5" fill="#FF1B8D"/>
  <g filter="url(#vfx_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vfx_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vfx_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
