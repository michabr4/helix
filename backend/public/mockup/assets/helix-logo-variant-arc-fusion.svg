<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="z32_t">
  <title id="z32_t">Helix - arc fusion (dark UI)</title>
  <defs>

    <linearGradient id="z32_bb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#7FDBFF"/>
    </linearGradient>
    <linearGradient id="z32_bb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="50%" stop-color="#FF1B8D"/><stop offset="100%" stop-color="#FDA4D0"/>
    </linearGradient>
    <linearGradient id="z32_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#e0f4fc"/><stop offset="65%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="z32_sw" x1="0%" y1="0%" x2="100%" y2="0%">
