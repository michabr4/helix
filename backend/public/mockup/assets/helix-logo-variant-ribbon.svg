<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vrib_title">
  <title id="vrib_title">Helix — ribbon / fused wave variant</title>
  <defs>
    <linearGradient id="vr_bb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003949"/><stop offset="40%" stop-color="#049FD9"/><stop offset="100%" stop-color="#7FDBFF"/>
    </linearGradient>
    <linearGradient id="vr_bb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BE185D"/><stop offset="45%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="vr_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="42%" stop-color="#e0f4fc"/><stop offset="72%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vr_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1B8D" stop-opacity="0.35"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="vr_g" cx="132" cy="52" r="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4DB8" stop-opacity="0.28"/><stop offset="100%" stop-color="#003949" stop-opacity="0"/>
    </radialGradient>
    <filter id="vr_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.55" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vr_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="56" rx="104" ry="58" fill="url(#vr_g)"/>
  <!-- Broad undertone, two interlaced waves -->
  <path fill="none" stroke="url(#vr_bb2)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.35" filter="url(#vr_glow)"
    d="M 68 88 C 84 36 112 24 138 44 C 164 64 172 84 196 92"/>
  <path fill="none" stroke="url(#vr_bb)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" filter="url(#vr_glow)"
    d="M 192 38 C 176 22 148 20 124 40 C 100 60 92 80 72 100"/>
  <path fill="none" stroke="url(#vr_bb2)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#vr_glow)"
    d="M 68 88 C 84 36 112 24 138 44 C 164 64 172 84 196 92"/>
  <path fill="none" stroke="url(#vr_bb)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#vr_glow)"
    d="M 192 38 C 176 22 148 20 124 40 C 100 60 92 80 72 100"/>
  <circle cx="130" cy="54" r="4.2" fill="#ffffff" stroke="#E6007E" stroke-width="1.3"/>
  <g filter="url(#vr_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vr_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vr_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
