<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="van_title">
  <title id="van_title">Helix - Anchor base</title>
  <defs>
    <linearGradient id="van_bb" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#7FDBFF"/>
    </linearGradient>
    <linearGradient id="van_bb2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="50%" stop-color="#FF1B8D"/><stop offset="100%" stop-color="#FDA4D0"/>
    </linearGradient>
    <linearGradient id="van_wm" x1="0%" y1="0%" x2="100%" y2="0%">
