<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vdp_title">
  <title id="vdp_title">Helix - Duplex strands</title>
  <defs>
    <linearGradient id="vdp_bb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#5BCFFF"/>
    </linearGradient>
    <linearGradient id="vdp_bb2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="50%" stop-color="#FF1B8D"/><stop offset="100%" stop-color="#FDA4D0"/>
    </linearGradient>
    <linearGradient id="vdp_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#e0f4fc"/><stop offset="70%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vdp_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6007E" stop-opacity="0.5"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#E6007E" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="vdp_g" cx="130" cy="56" r="74" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#049FD9" stop-opacity="0.12"/><stop offset="100%" stop-color="#003949" stop-opacity="0"/>
    </radialGradient>
    <filter id="vdp_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.45" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vdp_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="56" rx="100" ry="54" fill="url(#vdp_g)"/>
  <path fill="none" stroke="url(#vdp_bb)" stroke-width="7" stroke-linecap="round" filter="url(#vdp_glow)"
    d="M 78 32 C 110 32 118 56 130 72 C 142 56 154 32 182 32"/>
  <path fill="none" stroke="url(#vdp_bb2)" stroke-width="7" stroke-linecap="round" filter="url(#vdp_glow)"
    d="M 78 96 C 110 96 118 72 130 56 C 142 72 154 96 182 96"/>
  <path fill="#049FD9" opacity="0.85" d="M 76 30 L 84 30 L 80 38 Z"/>
  <path fill="#FF1B8D" opacity="0.85" d="M 176 94 L 184 94 L 180 86 Z"/>
  <circle cx="130" cy="64" r="4.5" fill="#ffffff" stroke="#E6007E" stroke-width="1.2"/>
  <g filter="url(#vdp_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vdp_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vdp_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
