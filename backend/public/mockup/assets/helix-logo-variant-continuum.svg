<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vcn_title">
  <title id="vcn_title">Helix - Continuum curves</title>
  <defs>
    <linearGradient id="vcn_bb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003949"/><stop offset="45%" stop-color="#049FD9"/><stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="vcn_bb2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="40%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="vcn_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#e0f4fc"/><stop offset="70%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vcn_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6007E" stop-opacity="0.45"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#E6007E" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="vcn_g" cx="130" cy="56" r="76" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#049FD9" stop-opacity="0.1"/><stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="vcn_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.55" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vcn_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="56" rx="100" ry="54" fill="url(#vcn_g)"/>
  <path fill="none" stroke="url(#vcn_bb)" stroke-width="6.5" stroke-linecap="round" filter="url(#vcn_glow)"
    d="M 72 88 C 72 36 104 20 130 20 C 156 20 188 40 188 88 C 188 108 170 110 154 100 C 138 90 130 72 130 58"/>
  <path fill="none" stroke="url(#vcn_bb2)" stroke-width="6.5" stroke-linecap="round" filter="url(#vcn_glow)"
    d="M 188 36 C 188 84 158 100 130 100 C 102 100 72 84 72 36 C 72 24 88 18 104 26 C 120 34 130 52 130 66"/>
  <circle cx="130" cy="58" r="4.5" fill="#ffffff" stroke="#049FD9" stroke-width="1.3"/>
  <circle cx="130" cy="24" r="2.8" fill="#FF1B8D"/><circle cx="130" cy="96" r="2.8" fill="#049FD9"/>
  <g filter="url(#vcn_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vcn_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vcn_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
