<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vcs_title">
  <title id="vcs_title">Helix - Cascade flow</title>
  <defs>
    <linearGradient id="vcs_bb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#5BCFFF"/>
    </linearGradient>
    <linearGradient id="vcs_bb2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="50%" stop-color="#E6007E"/><stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="vcs_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#e0f4fc"/><stop offset="70%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vcs_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6007E" stop-opacity="0.5"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#E6007E" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="vcs_g" cx="130" cy="58" r="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4DB8" stop-opacity="0.12"/><stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="vcs_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.45" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vcs_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="58" rx="102" ry="56" fill="url(#vcs_g)"/>
  <g stroke-linecap="round" opacity="0.35">
    <path stroke="#049FD9" stroke-width="2" d="M 96 34 L 164 34 M 100 48 L 160 48 M 104 62 L 156 62 M 108 76 L 152 76 M 114 90 L 146 90"/>
  </g>
  <path fill="none" stroke="url(#vcs_bb)" stroke-width="5.5" stroke-linecap="round" filter="url(#vcs_glow)"
    d="M 90 30 L 170 30 L 98 50 L 162 50 L 106 70 L 154 70 L 118 90 L 142 90"/>
  <path fill="none" stroke="url(#vcs_bb2)" stroke-width="5.5" stroke-linecap="round" filter="url(#vcs_glow)" opacity="0.92"
    d="M 170 34 L 98 54 L 166 54 L 102 74 L 158 74 L 112 94 L 148 94 L 130 102"/>
  <circle cx="130" cy="98" r="4" fill="#ffffff" stroke="#049FD9" stroke-width="1.2"/>
  <g filter="url(#vcs_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vcs_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vcs_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
