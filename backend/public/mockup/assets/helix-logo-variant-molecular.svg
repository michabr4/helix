<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vmol_title">
  <title id="vmol_title">Helix — molecular beads variant</title>
  <defs>
    <linearGradient id="vm_bb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#5BCFFF"/>
    </linearGradient>
    <linearGradient id="vm_bb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="vm_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="45%" stop-color="#e0f4fc"/><stop offset="70%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vm_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1B8D" stop-opacity="0.4"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="vm_g" cx="130" cy="58" r="76" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4DB8" stop-opacity="0.32"/><stop offset="100%" stop-color="#005C8C" stop-opacity="0"/>
    </radialGradient>
    <filter id="vm_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vm_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="58" rx="102" ry="56" fill="url(#vm_g)"/>
  <!-- Backbone through bead centers -->
  <path fill="none" stroke="url(#vm_bb2)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#vm_glow)"
    d="M 100 22 C 78 38 78 58 92 74 C 106 90 130 98 154 90 C 178 82 192 58 184 38 C 176 18 148 14 124 22 C 100 30 92 50 100 70 C 108 90 134 102 158 94"/>
  <path fill="none" stroke="url(#vm_bb)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#vm_glow)" opacity="0.92"
    d="M 160 22 C 182 38 182 58 168 74 C 154 90 130 98 106 90 C 82 82 68 58 76 38 C 84 18 112 14 136 22 C 160 30 168 50 160 70 C 168 85 152 96 138 100"/>
  <!-- Base beads -->
  <circle cx="100" cy="34" r="9" fill="#003949" stroke="url(#vm_bb2)" stroke-width="2.5"/>
  <circle cx="130" cy="48" r="10" fill="#049FD9" stroke="#7FDBFF" stroke-width="1.5"/>
  <circle cx="160" cy="34" r="9" fill="#9D174D" stroke="url(#vm_bb)" stroke-width="2.5"/>
  <circle cx="88" cy="62" r="8" fill="#BE185D" stroke="#FDA4D0" stroke-width="1.5"/>
  <circle cx="172" cy="62" r="8" fill="#005C8C" stroke="#049FD9" stroke-width="1.5"/>
  <circle cx="112" cy="88" r="8.5" fill="#FF1B8D" stroke="#FDA4D0" stroke-width="1.5"/>
  <circle cx="148" cy="88" r="8.5" fill="#049FD9" stroke="#ffffff" stroke-width="1.2" opacity="0.95"/>
  <circle cx="130" cy="108" r="7" fill="#F472B6" stroke="#ffe4f4" stroke-width="1.2"/>
  <g filter="url(#vm_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vm_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vm_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
