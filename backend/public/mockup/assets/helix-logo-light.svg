<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="htitle_l hdesc_l">
  <title id="htitle_l">Helix (light UI)</title>
  <desc id="hdesc_l">Double helix strands and rungs; wordmark Helix. Light-background variant.</desc>
  <defs>
    <linearGradient id="backbone-a-l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003949"/>
      <stop offset="28%" stop-color="#005C8C"/>
      <stop offset="52%" stop-color="#049FD9"/>
      <stop offset="78%" stop-color="#5BCFFF"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="backbone-b-l" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D174D"/>
      <stop offset="22%" stop-color="#BE185D"/>
      <stop offset="45%" stop-color="#049FD9"/>
      <stop offset="68%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="rung-grad-l" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#3D0D28" stop-opacity="0.88"/>
      <stop offset="40%" stop-color="#BE185D" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#049FD9" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#BE185D" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#3D0D28" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="wordmark-fill-l" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="38%" stop-color="#0c4a6e"/>
      <stop offset="62%" stop-color="#831843"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="sweep-grad-l" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1B8D" stop-opacity="0.35"/>
      <stop offset="22%" stop-color="#E6007E" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#049FD9"/>
      <stop offset="78%" stop-color="#E6007E" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF1B8D" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="wash-tr-l" cx="150" cy="28" r="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#049FD9" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#049FD9" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#049FD9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wash-bl-l" cx="108" cy="102" r="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#049FD9" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#049FD9" stop-opacity="0"/>
    </radialGradient>
    <filter id="strand-glow-l" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.55" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="mark-shadow-l" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2" result="blur"/>
      <feOffset dy="1" in="blur" result="off"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.65" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge>
        <feMergeNode in="sh"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <ellipse cx="130" cy="62" rx="102" ry="62" fill="url(#wash-bl-l)"/>
  <ellipse cx="142" cy="40" rx="88" ry="52" fill="url(#wash-tr-l)"/>

  <g stroke="url(#rung-grad-l)" stroke-width="3.2" stroke-linecap="round" opacity="0.95">
    <line x1="100" y1="34" x2="160" y2="34"/>
    <line x1="90" y1="50" x2="170" y2="50"/>
    <line x1="84" y1="66" x2="176" y2="66"/>
    <line x1="82" y1="82" x2="178" y2="82"/>
    <line x1="84" y1="98" x2="176" y2="98"/>
    <line x1="90" y1="114" x2="170" y2="114"/>
  </g>
  <path
    fill="none"
    stroke="url(#backbone-b-l)"
    stroke-width="8.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#strand-glow-l)"
    d="M 156 18
       C 100 28 78 50 82 70
       C 86 90 116 100 138 98
       C 164 96 188 80 186 58
       C 184 68 156 64 132 38
       C 108 42 88 60 92 80
       C 96 100 124 110 148 108
       C 176 104 196 88 194 66"
  />
  <path
    fill="none"
    stroke="url(#backbone-a-l)"
    stroke-width="8.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#strand-glow-l)"
    d="M 104 18
       C 160 26 186 48 182 68
       C 178 88 148 96 126 94
       C 102 92 80 74 82 52
       C 84 32 112 26 136 30
       C 160 34 180 52 176 72
       C 172 92 144 100 122 98
       C 96 96 76 80 80 58"
  />
  <circle cx="130" cy="34" r="3.8" fill="#FF4DB8" opacity="0.95"/>
  <circle cx="130" cy="66" r="3.8" fill="#049FD9" opacity="0.95"/>
  <circle cx="130" cy="98" r="3.8" fill="#FDA4D0" opacity="0.98"/>

  <g filter="url(#mark-shadow-l)">
    <text
      x="130"
      y="156"
      text-anchor="middle"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
      font-size="46"
      font-weight="800"
      letter-spacing="-0.055em"
      fill="url(#wordmark-fill-l)"
    >Helix</text>
  </g>
  <path
    d="M 48 166 Q 130 182 212 166"
    fill="none"
    stroke="url(#sweep-grad-l)"
    stroke-width="3.5"
    stroke-linecap="round"
  />
</svg>
