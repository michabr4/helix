<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="cgml_t">
  <title id="cgml_t">Helix - cognitive mesh (light UI)</title>
  <defs>

    <linearGradient id="cgm_bb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#7FDBFF"/>
    </linearGradient>
    <linearGradient id="cgm_bb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="50%" stop-color="#FF1B8D"/><stop offset="100%" stop-color="#FDA4D0"/>
    </linearGradient>
    <linearGradient id="cgm_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="38%" stop-color="#0c4a6e"/><stop offset="64%" stop-color="#831843"/><stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cgm_sw" x1="0%" y1="0%" x2="100%" y2="0%">
