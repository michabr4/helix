<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vag_title">
  <title id="vag_title">Helix - Aggregate hub</title>
  <defs>
    <linearGradient id="vag_bb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#5BCFFF"/>
    </linearGradient>
    <linearGradient id="vag_bb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="50%" stop-color="#E6007E"/><stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="vag_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#e0f4fc"/><stop offset="70%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vag_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E6007E" stop-opacity="0.45"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#E6007E" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="vag_g" cx="130" cy="58" r="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4DB8" stop-opacity="0.15"/><stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="vag_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vag_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="58" rx="102" ry="56" fill="url(#vag_g)"/>
  <g stroke-linecap="round" opacity="0.45">
    <path stroke="#049FD9" stroke-width="1.5" d="M 78 32 L 124 56 M 182 32 L 136 56 M 70 76 L 124 62 M 190 76 L 136 62 M 130 102 L 130 70"/>
  </g>
  <path fill="none" stroke="url(#vag_bb2)" stroke-width="6" stroke-linecap="round" filter="url(#vag_glow)"
    d="M 78 28 C 102 48 118 58 130 64 C 142 58 162 42 182 28"/>
  <path fill="none" stroke="url(#vag_bb)" stroke-width="6" stroke-linecap="round" filter="url(#vag_glow)"
    d="M 182 96 C 158 76 140 66 130 60 C 118 66 98 84 78 96"/>
  <circle cx="130" cy="64" r="8" fill="#020617" stroke="url(#vag_bb)" stroke-width="2"/>
  <circle cx="130" cy="64" r="4" fill="#ffffff"/>
  <g filter="url(#vag_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vag_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vag_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
