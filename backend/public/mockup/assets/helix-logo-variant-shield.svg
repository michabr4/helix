<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vfs_title">
  <title id="vfs_title">Helix - Cisco trust arc</title>
  <defs>
    <linearGradient id="vfs_bb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#5BCFFF"/>
    </linearGradient>
    <linearGradient id="vfs_bb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="45%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="vfs_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="42%" stop-color="#e0f4fc"/><stop offset="72%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vfs_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1B8D" stop-opacity="0.35"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="vfs_g" cx="130" cy="56" r="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#049FD9" stop-opacity="0.14"/><stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="vfs_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vfs_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="56" rx="100" ry="54" fill="url(#vfs_g)"/>
  <!-- Protective enclosure (open bottom) -->
  <path fill="none" stroke="#049FD9" stroke-width="2.2" stroke-linecap="round" opacity="0.45"
    d="M 74 84 Q 130 22 186 84"/>
  <path fill="none" stroke="#E6007E" stroke-width="1.6" stroke-linecap="round" opacity="0.35"
    d="M 82 80 Q 130 32 178 80"/>
  <!-- Strands inside trust boundary -->
  <path fill="none" stroke="url(#vfs_bb2)" stroke-width="6" stroke-linecap="round" filter="url(#vfs_glow)"
    d="M 96 76 C 108 52 118 44 130 48 C 142 44 156 58 164 76"/>
  <path fill="none" stroke="url(#vfs_bb)" stroke-width="6" stroke-linecap="round" filter="url(#vfs_glow)" opacity="0.95"
    d="M 164 64 C 148 84 138 92 130 96 C 122 92 110 78 96 64"/>
  <circle cx="130" cy="72" r="4.5" fill="#ffffff" stroke="#049FD9" stroke-width="1.3"/>
  <g filter="url(#vfs_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vfs_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vfs_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
