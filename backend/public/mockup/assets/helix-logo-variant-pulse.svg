<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vpp_title">
  <title id="vpp_title">Helix - Cisco telemetry pulse</title>
  <defs>
    <linearGradient id="vpp_bb" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#003949"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#5BCFFF"/>
    </linearGradient>
    <linearGradient id="vpp_bb2" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="50%" stop-color="#E6007E"/><stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="vpp_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="42%" stop-color="#e0f4fc"/><stop offset="72%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vpp_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1B8D" stop-opacity="0.4"/><stop offset="50%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="vpp_g" cx="130" cy="58" r="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#049FD9" stop-opacity="0.15"/><stop offset="70%" stop-color="#E6007E" stop-opacity="0.08"/><stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="vpp_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.45" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="vpp_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="58" rx="104" ry="56" fill="url(#vpp_g)"/>
  <!-- Expanding observability rings -->
  <path fill="none" stroke="url(#vpp_bb)" stroke-width="2.8" stroke-linecap="round" opacity="0.85" filter="url(#vpp_glow)"
    d="M 74 58 A 56 36 0 0 1 186 58"/>
  <path fill="none" stroke="url(#vpp_bb2)" stroke-width="2.4" stroke-linecap="round" opacity="0.75" filter="url(#vpp_glow)"
    d="M 86 58 A 44 28 0 0 1 174 58"/>
  <path fill="none" stroke="#7FDBFF" stroke-width="1.8" stroke-linecap="round" opacity="0.6"
    d="M 98 58 A 32 20 0 0 1 162 58"/>
  <!-- Dual carrier waves -->
  <path fill="none" stroke="url(#vpp_bb2)" stroke-width="5" stroke-linecap="round" filter="url(#vpp_glow)"
    d="M 78 88 C 100 48 112 40 130 52 C 148 40 160 48 182 88"/>
  <path fill="none" stroke="url(#vpp_bb)" stroke-width="5" stroke-linecap="round" filter="url(#vpp_glow)" opacity="0.92"
    d="M 182 44 C 160 78 148 86 130 72 C 112 86 100 78 78 44"/>
  <circle cx="130" cy="58" r="5.5" fill="#ffffff" stroke="#049FD9" stroke-width="1.5"/>
  <g filter="url(#vpp_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vpp_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vpp_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
