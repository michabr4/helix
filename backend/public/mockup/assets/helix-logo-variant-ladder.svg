<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 176" role="img" aria-labelledby="vL_title">
  <title id="vL_title">Helix — DNA ladder variant</title>
  <defs>
    <linearGradient id="vL_bb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003949"/><stop offset="52%" stop-color="#049FD9"/><stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="vL_bb2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D174D"/><stop offset="45%" stop-color="#049FD9"/><stop offset="100%" stop-color="#FF1B8D"/>
    </linearGradient>
    <linearGradient id="vL_rung" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#BE185D" stop-opacity="0.55"/><stop offset="50%" stop-color="#049FD9" stop-opacity="0.5"/><stop offset="100%" stop-color="#BE185D" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="vL_wm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#e0f4fc"/><stop offset="70%" stop-color="#fda4d0"/><stop offset="100%" stop-color="#ffe4f4"/>
    </linearGradient>
    <linearGradient id="vL_sw" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF1B8D" stop-opacity="0.35"/><stop offset="25%" stop-color="#E6007E" stop-opacity="0.85"/><stop offset="50%" stop-color="#049FD9"/><stop offset="75%" stop-color="#E6007E" stop-opacity="0.8"/><stop offset="100%" stop-color="#FF1B8D" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="vL_g" cx="138" cy="38" r="78" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4DB8" stop-opacity="0.35"/><stop offset="100%" stop-color="#049FD9" stop-opacity="0"/>
    </radialGradient>
    <filter id="vL_glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="0.55" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="vL_sh" x="-8%" y="-8%" width="116%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4" result="blur"/>
      <feOffset in="blur" dy="1.5" result="off"/>
      <feFlood flood-color="#020617" flood-opacity="0.45" result="f"/>
      <feComposite in="f" in2="off" operator="in" result="sh"/>
      <feMerge>
        <feMergeNode in="sh"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <ellipse cx="130" cy="62" rx="108" ry="58" fill="url(#vL_g)"/>
  <!-- Base pairs: alternate direction where strands cross -->
  <g stroke="url(#vL_rung)" stroke-width="3.2" stroke-linecap="round" opacity="0.95">
    <line x1="104" y1="28" x2="156" y2="28"/>
    <line x1="156" y1="49" x2="104" y2="49"/>
    <line x1="104" y1="70" x2="156" y2="70"/>
    <line x1="156" y1="91" x2="104" y2="91"/>
    <line x1="104" y1="112" x2="156" y2="112"/>
  </g>
  <!-- Inverted-sine backbones as explicit L-paths (avoids polyline + gradient quirks) -->
  <path
    fill="none"
    stroke="url(#vL_bb2)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#vL_glow)"
    d="M 130 18 L 104 28 L 130 39 L 156 49 L 130 60 L 104 70 L 130 81 L 156 91 L 130 102 L 104 112 L 130 122"/>
  <path
    fill="none"
    stroke="url(#vL_bb)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#vL_glow)"
    d="M 130 18 L 156 28 L 130 39 L 104 49 L 130 60 L 156 70 L 130 81 L 104 91 L 130 102 L 156 112 L 130 122"/>
  <circle cx="130" cy="28" r="3.5" fill="#FF4DB8"/><circle cx="130" cy="70" r="3.5" fill="#049FD9"/><circle cx="130" cy="112" r="3.5" fill="#FDA4D0"/>
  <g filter="url(#vL_sh)">
    <text x="130" y="156" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.055em" fill="url(#vL_wm)">Helix</text>
  </g>
  <path d="M 48 166 Q 130 182 212 166" fill="none" stroke="url(#vL_sw)" stroke-width="3.5" stroke-linecap="round"/>
</svg>
