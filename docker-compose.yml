services:
  postgres:
    image: postgres:15-alpine
    container_name: serviceflow-postgres
    environment:
      POSTGRES_DB: helix_sdm
      POSTGRES_USER: serviceflow_admin
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serviceflow_admin -d helix_sdm"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: serviceflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: serviceflow-backend
    env_file:
      - .env  # Copy .env.example to .env and populate all secrets before running
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: serviceflow-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1
    ports:
      - "3001:3001"
    depends_on:
      - backend

volumes:
  pg_data:
