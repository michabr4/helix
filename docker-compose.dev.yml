# Local development infrastructure only — postgres + redis
# Run: docker-compose -f docker-compose.dev.yml up -d
# Then: cd backend && npm run dev   (port 3000)
#       cd frontend && npm run dev  (port 3001)
services:
  postgres:
    image: postgres:15-alpine
    container_name: serviceflow-postgres
    environment:
      POSTGRES_DB: helix_sdm
      POSTGRES_USER: serviceflow_admin
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serviceflow_admin -d helix_sdm"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: serviceflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
